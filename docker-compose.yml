# Granite Guardian proxy — three-service pipeline:
# client -> nginx (SSL) -> mitmproxy (Guardian check) -> OpenAI

services:

  nginx:
    image: nginx:alpine
    container_name: granite-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/cert.pem:/etc/nginx/ssl/cert.pem:ro
      - ./certs/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - mitmproxy
    networks:
      - proxy-network

  mitmproxy:
    build:
      context: ./mitmproxy
    container_name: granite-mitmproxy
    ports:
      - "8080:8080"
    environment:
      - IBM_API_KEY=${IBM_API_KEY}
      - IBM_PROJECT_ID=${IBM_PROJECT_ID}
      - IBM_URL=${IBM_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TOXICITY_THRESHOLD=${TOXICITY_THRESHOLD}
    networks:
      - proxy-network

  client:
    build:
      context: ./client
    container_name: granite-client
    volumes:
      - ./certs/cert.pem:/app/cert.pem:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - nginx
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge
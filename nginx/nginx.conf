# SSL-terminating reverse proxy for the Granite Guardian mitmproxy pipeline

events {
    worker_connections 1024;
}

http {
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Restrict to modern TLS versions and strong ciphers
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass             http://mitmproxy:8080;
            proxy_http_version     1.1;

            # Preserve original request context through the proxy chain
            proxy_set_header Host              api.openai.com;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Extended timeouts to accommodate LLM response latency
            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
        }
    }
}